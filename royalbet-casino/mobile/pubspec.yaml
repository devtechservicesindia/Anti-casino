name: royalbet_casino
description: RoyalBet Casino – Flutter 3 mobile client
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.7.0
  retrofit: ^4.2.0
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

  # WebSockets
  socket_io_client: ^2.0.3+1

  # Navigation
  go_router: ^14.2.3

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Local storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Game canvas (WebGL bridge placeholder)
  webview_flutter: ^4.9.0

  # Payments
  razorpay_flutter: ^1.3.8

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
